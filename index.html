<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:400px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:20px;
}

#display{
    font-size:2.5rem;
    font-weight:bold;
    margin-bottom:20px;
    color:#333;
}

.buttons button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

.start{
    background:#28a745;
    color:white;
}

.pause{
    background:#ffc107;
}

.reset{
    background:#dc3545;
    color:white;
}

.lap{
    background:#007bff;
    color:white;
}

.buttons button:hover{
    opacity:0.8;
}

.laps{
    margin-top:20px;
    max-height:200px;
    overflow-y:auto;
    text-align:left;
}

.laps h3{
    margin-bottom:10px;
}

.laps ul{
    list-style:none;
}

.laps li{
    padding:8px;
    border-bottom:1px solid #ddd;
}
</style>
</head>
<body>

<div class="container">
    <h1>Stopwatch</h1>

    <div id="display">00:00:00:000</div>

    <div class="buttons">
        <button class="start" onclick="startStopwatch()">Start</button>
        <button class="pause" onclick="pauseStopwatch()">Pause</button>
        <button class="reset" onclick="resetStopwatch()">Reset</button>
        <button class="lap" onclick="recordLap()">Lap</button>
    </div>

    <div class="laps">
        <h3>Lap Times</h3>
        <ul id="lapList"></ul>
    </div>
</div>

<script>
let startTime;
let elapsedTime = 0;
let timerInterval;

function updateDisplay() {
    let time = elapsedTime;

    let hours = Math.floor(time / 3600000);
    let minutes = Math.floor((time % 3600000) / 60000);
    let seconds = Math.floor((time % 60000) / 1000);
    let milliseconds = time % 1000;

    document.getElementById("display").textContent =
        String(hours).padStart(2, "0") + ":" +
        String(minutes).padStart(2, "0") + ":" +
        String(seconds).padStart(2, "0") + ":" +
        String(milliseconds).padStart(3, "0");
}

function startStopwatch() {
    if (!timerInterval) {
        startTime = Date.now() - elapsedTime;

        timerInterval = setInterval(() => {
            elapsedTime = Date.now() - startTime;
            updateDisplay();
        }, 10);
    }
}

function pauseStopwatch() {
    clearInterval(timerInterval);
    timerInterval = null;
}

function resetStopwatch() {
    clearInterval(timerInterval);
    timerInterval = null;
    elapsedTime = 0;
    updateDisplay();
    document.getElementById("lapList").innerHTML = "";
}

function recordLap() {
    if(elapsedTime > 0){
        const lap = document.createElement("li");
        lap.textContent = document.getElementById("display").textContent;
        document.getElementById("lapList").appendChild(lap);
    }
}

updateDisplay();
</script>

</body>
</html>
